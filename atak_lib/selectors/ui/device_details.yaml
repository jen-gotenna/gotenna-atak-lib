# Selector catalog: goTenna Device Details page (radio connected via BLE).
# DEFINITIONS ONLY -- how to ADDRESS each element. No assertions / expected results
# (those live in the consuming test framework). See docs/design/shared-ui-driver.md.
#
# `status` = selector RESOLVABILITY on the baseline build. All 23 CONFIRMED on
# plugin 3.0.0 (859d398a) + a Pro X2 radio (TestRail C149719). Long/scrollable page.

screen: device_details
layer: ui
app: com.gotenna.atak
supported_versions: ["3.0"]

selectors:
  status_icon:
    by: id
    value: com.gotenna.atak:id/deviceDetailsStatusImageView
    status: CONFIRMED
    description: Connection status icon (bluetooth/connected)
  status_text:
    by: id
    value: com.gotenna.atak:id/deviceDetailsStatusTextView
    status: CONFIRMED
    description: Connection status text
